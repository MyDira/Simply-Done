/* ─── RECIPE FORM ────────────────────────────────────────────────────────── */
const RecipeForm = ({ initial, onSave, onCancel, t }) => {
  const empty = {
    title: '', category: 'Meat', tags: [], description: '', story: '',
    prepTime: '', cookTime: '', servings: '', difficulty: 'Easy',
    ingredients: [''], steps: [''], notes: ''
  };
  const [form, setForm] = useState(initial || empty);
  const [tagInput, setTagInput] = useState('');

  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const updateList = (key, idx, val) => {
    const arr = [...form[key]];
    arr[idx] = val;
    set(key, arr);
  };
  const addListItem = (key) => set(key, [...form[key], '']);
  const removeListItem = (key, idx) => set(key, form[key].filter((_, i) => i !== idx));

  const addTag = () => {
    const v = tagInput.trim();
    if (v && !form.tags.includes(v)) set('tags', [...form.tags, v]);
    setTagInput('');
  };

  const inputStyle = {
    width: '100%', padding: '10px 14px', borderRadius: 8,
    border: `1px solid ${t.inputBorder}`, background: t.inputBg,
    color: t.text, fontFamily: 'DM Sans, sans-serif', fontSize: 14,
    outline: 'none', transition: 'border 0.15s'
  };

  const labelStyle = {
    display: 'block', fontSize: 11, fontWeight: 600,
    letterSpacing: '0.06em', textTransform: 'uppercase',
    color: t.textMuted, marginBottom: 6
  };

  const Section = ({ title, children }) => (
    <div style={{ marginBottom: 28 }}>
      <h3 style={{
        fontFamily: 'Playfair Display, serif', fontSize: 17, color: t.text,
        fontWeight: 600, marginBottom: 16, paddingBottom: 10,
        borderBottom: `1px solid ${t.border}`
      }}>{title}</h3>
      {children}
    </div>
  );

  return (
    <div style={{ maxWidth: 780, margin: '0 auto', padding: '0 0 80px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 0 32px' }}>
        <h2 style={{ fontFamily: 'Playfair Display, serif', fontSize: 28, fontWeight: 700, color: t.text }}>
          {initial ? 'Edit Recipe' : 'New Recipe'}
        </h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={onCancel} style={{
            padding: '9px 20px', borderRadius: 8, border: `1px solid ${t.border}`,
            background: t.bgCard, color: t.textMuted, cursor: 'pointer',
            fontFamily: 'DM Sans, sans-serif', fontSize: 14
          }}>Cancel</button>
          <button onClick={() => onSave(form)} style={{
            display: 'flex', alignItems: 'center', gap: 7,
            padding: '9px 22px', borderRadius: 8, border: 'none',
            background: t.accent, color: t.accentText, cursor: 'pointer',
            fontFamily: 'DM Sans, sans-serif', fontSize: 14, fontWeight: 600
          }}>
            <Icon name="save" size={15} /> Save Recipe
          </button>
        </div>
      </div>

      <Section title="Basics">
        <div style={{ display: 'grid', gap: 16 }}>
          <div>
            <label style={labelStyle}>Recipe Title *</label>
            <input style={inputStyle} value={form.title}
              placeholder="e.g. Slow-Roasted Lamb Shoulder"
              onChange={e => set('title', e.target.value)} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div>
              <label style={labelStyle}>Category</label>
              <select style={inputStyle} value={form.category} onChange={e => set('category', e.target.value)}>
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Difficulty</label>
              <select style={inputStyle} value={form.difficulty} onChange={e => set('difficulty', e.target.value)}>
                {['Easy','Medium','Hard'].map(d => <option key={d}>{d}</option>)}
              </select>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
            <div>
              <label style={labelStyle}>Prep Time (min)</label>
              <input style={inputStyle} type="number" value={form.prepTime}
                onChange={e => set('prepTime', e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>Cook Time (min)</label>
              <input style={inputStyle} type="number" value={form.cookTime}
                onChange={e => set('cookTime', e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>Servings</label>
              <input style={inputStyle} type="number" value={form.servings}
                onChange={e => set('servings', e.target.value)} />
            </div>
          </div>
          <div>
            <label style={labelStyle}>Tags</label>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
              {form.tags.map(tag => (
                <span key={tag} style={{
                  display: 'flex', alignItems: 'center', gap: 5,
                  padding: '3px 10px', borderRadius: 99,
                  background: t.accentSoft, color: t.accent,
                  fontSize: 12, border: `1px solid ${t.accent}44`
                }}>
                  {tag}
                  <button onClick={() => set('tags', form.tags.filter(t2 => t2 !== tag))}
                    style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'inherit', padding: 0, lineHeight: 1 }}>×</button>
                </span>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input style={{ ...inputStyle, flex: 1 }} value={tagInput}
                placeholder="Add a tag (e.g. Weeknight, Spicy)…"
                onChange={e => setTagInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addTag()} />
              <button onClick={addTag} style={{
                padding: '10px 16px', borderRadius: 8, border: `1px solid ${t.border}`,
                background: t.bgCard, color: t.textMuted, cursor: 'pointer',
                fontFamily: 'DM Sans, sans-serif', fontSize: 13
              }}>Add</button>
            </div>
          </div>
        </div>
      </Section>

      <Section title="Photo">
        <PhotoPlaceholder label="Drop your recipe photo here" t={t}
          style={{ width: '100%', height: 200, borderRadius: 12, cursor: 'pointer' }} />
        <p style={{ fontSize: 12, color: t.textLight, marginTop: 8 }}>Photo upload coming in the full version</p>
      </Section>

      <Section title="Description & Story">
        <div style={{ display: 'grid', gap: 16 }}>
          <div>
            <label style={labelStyle}>Description</label>
            <textarea style={{ ...inputStyle, resize: 'vertical', minHeight: 80 }}
              value={form.description} placeholder="A short description of the dish…"
              onChange={e => set('description', e.target.value)} />
          </div>
          <div>
            <label style={labelStyle}>Your story / memory</label>
            <textarea style={{ ...inputStyle, resize: 'vertical', minHeight: 100 }}
              value={form.story} placeholder="Where does this recipe come from? What does it mean to you?"
              onChange={e => set('story', e.target.value)} />
          </div>
        </div>
      </Section>

      <Section title="Ingredients">
        <p style={{ fontSize: 12, color: t.textMuted, marginBottom: 12 }}>
          Use <code style={{ background: t.bgAccent, padding: '1px 5px', borderRadius: 4 }}>—</code> as a separator between ingredient groups.
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {form.ingredients.map((ing, i) => (
            <div key={i} style={{ display: 'flex', gap: 8 }}>
              <input style={{ ...inputStyle, flex: 1 }} value={ing}
                placeholder={i === 0 ? 'e.g. 2 tbsp olive oil' : ''}
                onChange={e => updateList('ingredients', i, e.target.value)} />
              <button onClick={() => removeListItem('ingredients', i)} style={{
                padding: '8px 12px', borderRadius: 8, border: `1px solid ${t.border}`,
                background: t.bgCard, color: t.textLight, cursor: 'pointer'
              }}>×</button>
            </div>
          ))}
        </div>
        <button onClick={() => addListItem('ingredients')} style={{
          marginTop: 10, display: 'flex', alignItems: 'center', gap: 6,
          padding: '8px 16px', borderRadius: 8, border: `1px dashed ${t.border}`,
          background: 'none', color: t.textMuted, cursor: 'pointer',
          fontFamily: 'DM Sans, sans-serif', fontSize: 13
        }}>
          <Icon name="plus" size={14} /> Add ingredient
        </button>
      </Section>

      <Section title="Method">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {form.steps.map((step, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <span style={{
                flexShrink: 0, width: 28, height: 28, borderRadius: '50%',
                background: t.accentSoft, color: t.accent,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Playfair Display, serif', fontWeight: 600, fontSize: 13, marginTop: 6
              }}>{i + 1}</span>
              <textarea style={{ ...inputStyle, flex: 1, resize: 'vertical', minHeight: 72 }}
                value={step}
                placeholder={`Step ${i + 1}…`}
                onChange={e => updateList('steps', i, e.target.value)} />
              <button onClick={() => removeListItem('steps', i)} style={{
                padding: '8px 10px', borderRadius: 8, border: `1px solid ${t.border}`,
                background: t.bgCard, color: t.textLight, cursor: 'pointer', marginTop: 6
              }}>×</button>
            </div>
          ))}
        </div>
        <button onClick={() => addListItem('steps')} style={{
          marginTop: 10, display: 'flex', alignItems: 'center', gap: 6,
          padding: '8px 16px', borderRadius: 8, border: `1px dashed ${t.border}`,
          background: 'none', color: t.textMuted, cursor: 'pointer',
          fontFamily: 'DM Sans, sans-serif', fontSize: 13
        }}>
          <Icon name="plus" size={14} /> Add step
        </button>
      </Section>

      <Section title="Chef's Notes">
        <textarea style={{ ...inputStyle, resize: 'vertical', minHeight: 90 }}
          value={form.notes}
          placeholder="Tips, substitutions, make-ahead advice…"
          onChange={e => set('notes', e.target.value)} />
      </Section>
    </div>
  );
};

                    <span style={{ color: t.textMuted, fontSize: 12 }}>
                      {r.prepTime + r.cookTime}m · Serves {r.servings}
                    </span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>

        {/* Chapter pages */}
        {chapters.map(cat => {
          const catRecipes = recipes.filter(r => r.category === cat);
          return (
            <div key={cat}>
              {/* Chapter header */}
              <div style={{
                padding: '60px 0 40px',
                borderTop: `2px solid ${t.border}`,
                marginBottom: 40, pageBreakBefore: 'always'
              }}>
                <div style={{ fontSize: 11, letterSpacing: '0.12em', color: t.gold, marginBottom: 10, fontWeight: 600, textTransform: 'uppercase' }}>Chapter</div>
                <h2 style={{
                  fontFamily: 'Playfair Display, serif', fontSize: 42,
                  fontWeight: 700, color: t.text
                }}>{cat}</h2>
                <div style={{ width: 40, height: 2, background: t.accent, marginTop: 16 }} />
              </div>

              {/* Recipes in chapter */}
              {catRecipes.map(recipe => (
                <div key={recipe.id} style={{
                  marginBottom: 60, pageBreakInside: 'avoid',
                  paddingBottom: 48, borderBottom: `1px solid ${t.border}`
                }}>
                  <div style={{ marginBottom: 20 }}>
                    <h3 style={{
                      fontFamily: 'Playfair Display, serif', fontSize: 28,
                      fontWeight: 600, color: t.text, marginBottom: 10
                    }}>{recipe.title}</h3>
                    <div style={{ display: 'flex', gap: 20, fontSize: 12, color: t.textMuted }}>
                      <span>Prep: {recipe.prepTime}m</span>
                      <span>Cook: {recipe.cookTime}m</span>
                      <span>Serves: {recipe.servings}</span>
                      <span>Difficulty: {recipe.difficulty}</span>
                    </div>
                  </div>

                  {recipe.story && (
                    <p style={{
                      fontFamily: 'Playfair Display, serif', fontStyle: 'italic',
                      fontSize: 14, color: t.textMuted, lineHeight: 1.7,
                      marginBottom: 20, paddingLeft: 16, borderLeft: `2px solid ${t.accent}`
                    }}>"{recipe.story}"</p>
                  )}

                  {recipe.description && (
                    <p style={{ fontSize: 13.5, color: t.text, lineHeight: 1.7, marginBottom: 24 }}>{recipe.description}</p>
                  )}

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.5fr', gap: 32 }}>
                    <div>
                      <h4 style={{ fontFamily: 'Playfair Display, serif', fontSize: 16, color: t.text, marginBottom: 12 }}>Ingredients</h4>
                      <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 6 }}>
                        {recipe.ingredients?.map((ing, i) => ing === '—' ? (
                          <li key={i} style={{ height: 1, background: t.border, margin: '4px 0' }} />
                        ) : (
                          <li key={i} style={{ fontSize: 12.5, color: t.text, display: 'flex', gap: 8, lineHeight: 1.5 }}>
                            <span style={{ color: t.accent, marginTop: 3, fontSize: 8 }}>●</span> {ing}
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div>
                      <h4 style={{ fontFamily: 'Playfair Display, serif', fontSize: 16, color: t.text, marginBottom: 12 }}>Method</h4>
                      <ol style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 12 }}>
                        {recipe.steps?.map((step, i) => (
                          <li key={i} style={{ display: 'flex', gap: 10, fontSize: 12.5, color: t.text, lineHeight: 1.6 }}>
                            <span style={{ flexShrink: 0, fontFamily: 'Playfair Display, serif', fontWeight: 700, color: t.accent, fontSize: 14 }}>{i + 1}.</span>
                            {step}
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>

                  {recipe.notes && (
                    <div style={{ marginTop: 20, padding: '12px 16px', borderRadius: 8, background: t.bgAccent }}>
                      <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: t.gold }}>Chef's Notes</span>
                      <p style={{ fontSize: 12.5, color: t.text, lineHeight: 1.65, marginTop: 6 }}>{recipe.notes}</p>
                    </div>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ─── MAIN APP ───────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "lavender",
  "showIntro": true
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const t = THEMES[tweaks.theme] || THEMES.lavender;

  const [recipes, setRecipes] = useState(() => {
    try {
      const saved = localStorage.getItem('simply-done-recipes');
      return saved ? JSON.parse(saved) : SEED_RECIPES;
    } catch { return SEED_RECIPES; }
  });

  const [view, setView] = useState('browse'); // browse | detail | form | print
  const [activeRecipe, setActiveRecipe] = useState(null);
  const [editRecipe, setEditRecipe] = useState(null);
  const [searchQ, setSearchQ] = useState('');
  const [activeCategory, setActiveCategory] = useState('All');
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [showPrint, setShowPrint] = useState(false);

  useEffect(() => {
    localStorage.setItem('simply-done-recipes', JSON.stringify(recipes));
  }, [recipes]);

  const filtered = recipes.filter(r => {
    const matchesCat = activeCategory === 'All' || r.category === activeCategory;
    const q = searchQ.toLowerCase();
    const matchesSearch = !q || r.title.toLowerCase().includes(q) ||
      r.tags?.some(t2 => t2.toLowerCase().includes(q)) ||
      r.category.toLowerCase().includes(q);
    return matchesCat && matchesSearch;
  });

  const handleSave = (form) => {
    if (editRecipe) {
      setRecipes(rs => rs.map(r => r.id === editRecipe.id ? { ...editRecipe, ...form } : r));
    } else {
      const newR = { ...form, id: Date.now(), createdAt: new Date().toISOString().slice(0, 10) };
      setRecipes(rs => [...rs, newR]);
    }
    setView('browse');
    setEditRecipe(null);
  };

  const handleDelete = () => {
    setRecipes(rs => rs.filter(r => r.id !== activeRecipe.id));
    setView('browse');
    setActiveRecipe(null);
  };

  const categoryCounts = ['All', ...CATEGORIES].reduce((acc, c) => {
    acc[c] = c === 'All' ? recipes.length : recipes.filter(r => r.category === c).length;
    return acc;
  }, {});

  // Apply theme to scrollbar
  useEffect(() => {
    const style = document.createElement('style');
    style.id = 'theme-scrollbar';
    style.textContent = `::-webkit-scrollbar-thumb { background: ${t.scrollThumb}; }`;
    document.getElementById('theme-scrollbar')?.remove();
    document.head.appendChild(style);
  }, [t.scrollThumb]);

  return (
    <div style={{ display: 'flex', height: '100vh', background: t.bg, color: t.text }}>

      {/* Sidebar */}
      <div style={{
        width: sidebarOpen ? 220 : 0, flexShrink: 0,
        background: t.bgSidebar, borderRight: `1px solid ${t.border}`,
        overflow: 'hidden', transition: 'width 0.2s ease',
        display: 'flex', flexDirection: 'column'
      }}>
        <div style={{ padding: '28px 20px 16px', flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Playfair Display, serif', fontStyle: 'italic',
            fontSize: 22, color: t.accent, marginBottom: 4, letterSpacing: '-0.01em'
          }}>Simply Done</div>
          <div style={{ fontSize: 10, color: t.textLight, letterSpacing: '0.08em', textTransform: 'uppercase' }}>
            A personal cookbook
          </div>
        </div>

        <div style={{ padding: '8px 12px', flexShrink: 0 }}>
          <button onClick={() => { setView('form'); setEditRecipe(null); }} style={{
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,
            width: '100%', padding: '9px 14px', borderRadius: 10, border: 'none',
            background: t.accent, color: t.accentText, cursor: 'pointer',
            fontFamily: 'DM Sans, sans-serif', fontSize: 13, fontWeight: 600
          }}>
            <Icon name="plus" size={15} /> New Recipe
          </button>
        </div>

        <div style={{ flex: 1, overflow: 'auto', padding: '12px 12px' }}>
          <div style={{
            fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', color: t.textLight,
            padding: '4px 8px', marginBottom: 4
          }}>Categories</div>

          {['All', ...CATEGORIES].map(cat => (
            <button key={cat}
              onClick={() => { setActiveCategory(cat); setView('browse'); }}
              style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                width: '100%', padding: '8px 10px', borderRadius: 8, border: 'none',
                background: activeCategory === cat ? t.bgAccent : 'none',
                color: activeCategory === cat ? t.accent : t.textMuted,
                cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                fontSize: 13, fontWeight: activeCategory === cat ? 600 : 400,
                transition: 'all 0.12s'
              }}>
              <span>{cat}</span>
              <span style={{
                fontSize: 10, padding: '1px 6px', borderRadius: 99,
                background: activeCategory === cat ? t.accent : t.bgAccent,
                color: activeCategory === cat ? t.accentText : t.textLight
              }}>{categoryCounts[cat] || 0}</span>
            </button>
          ))}
        </div>

        <div style={{ padding: '12px 12px', borderTop: `1px solid ${t.border}`, flexShrink: 0 }}>
          <button onClick={() => setShowPrint(true)} style={{
            display: 'flex', alignItems: 'center', gap: 7,
            width: '100%', padding: '8px 10px', borderRadius: 8, border: 'none',
            background: 'none', color: t.textMuted, cursor: 'pointer',
            fontFamily: 'DM Sans, sans-serif', fontSize: 13
          }}>
            <Icon name="print" size={14} /> Export to PDF
          </button>
        </div>
      </div>

      {/* Main area */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Topbar */}
        <div style={{
          background: t.headerBg, borderBottom: `1px solid ${t.border}`,
          padding: '0 28px', height: 56, display: 'flex', alignItems: 'center',
          gap: 14, flexShrink: 0
        }}>
          <button onClick={() => setSidebarOpen(o => !o)} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            color: t.textMuted, display: 'flex', padding: 4
          }}>
            <Icon name="menu" size={18} />
          </button>

          {view === 'browse' && (
            <div style={{
              flex: 1, display: 'flex', alignItems: 'center', gap: 10,
              background: t.inputBg, borderRadius: 8, padding: '0 14px',
              border: `1px solid ${t.inputBorder}`, maxWidth: 400
            }}>
              <Icon name="search" size={15} style={{ color: t.textLight, flexShrink: 0 }} />
              <input
                style={{
                  flex: 1, border: 'none', background: 'none', outline: 'none',
                  fontFamily: 'DM Sans, sans-serif', fontSize: 13, color: t.text,
                  height: 36
                }}
                placeholder="Search recipes…"
                value={searchQ}
                onChange={e => setSearchQ(e.target.value)}
              />
            </div>
          )}

          <div style={{ flex: 1 }} />

          {view === 'browse' && (
            <span style={{ fontSize: 12, color: t.textMuted }}>
              {filtered.length} recipe{filtered.length !== 1 ? 's' : ''}
            </span>
          )}
        </div>

        {/* Content */}
        <div style={{ flex: 1, overflow: 'auto', padding: '0 28px' }}>
          {view === 'browse' && (
            <div style={{ paddingTop: 28 }}>
              {activeCategory !== 'All' && (
                <div style={{ marginBottom: 28 }}>
                  <h2 style={{
                    fontFamily: 'Playfair Display, serif', fontSize: 30,
                    fontWeight: 700, color: t.text, marginBottom: 4
                  }}>{activeCategory}</h2>
                  <p style={{ fontSize: 13, color: t.textMuted }}>
                    {filtered.length} recipe{filtered.length !== 1 ? 's' : ''}
                  </p>
                </div>
              )}
              {activeCategory === 'All' && !searchQ && (
                <div style={{ marginBottom: 28 }}>
                  <h2 style={{
                    fontFamily: 'Playfair Display, serif', fontSize: 30,
                    fontWeight: 700, color: t.text, marginBottom: 4
                  }}>All Recipes</h2>
                  <p style={{ fontSize: 13, color: t.textMuted }}>Your full collection</p>
                </div>
              )}
              {searchQ && (
                <div style={{ marginBottom: 24, fontSize: 14, color: t.textMuted }}>
                  Results for "<strong style={{ color: t.text }}>{searchQ}</strong>"
                </div>
              )}
              {filtered.length === 0 ? (
                <div style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center',
                  justifyContent: 'center', gap: 16, paddingTop: 80, color: t.textMuted
                }}>
                  <Icon name="book" size={48} style={{ opacity: 0.3 }} />
                  <p style={{ fontSize: 15 }}>No recipes found</p>
                  <button onClick={() => { setView('form'); setEditRecipe(null); }} style={{
                    padding: '10px 20px', borderRadius: 8, border: 'none',
                    background: t.accent, color: t.accentText, cursor: 'pointer',
                    fontFamily: 'DM Sans, sans-serif', fontSize: 14
                  }}>Add the first one</button>
                </div>
              ) : (
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))',
                  gap: 20, paddingBottom: 48
                }}>
                  {filtered.map(recipe => (
                    <RecipeCard key={recipe.id} recipe={recipe} t={t}
                      onClick={() => { setActiveRecipe(recipe); setView('detail'); }} />
                  ))}
                </div>
              )}
            </div>
          )}

          {view === 'detail' && activeRecipe && (
            <RecipeDetail
              recipe={activeRecipe}
              t={t}
              onBack={() => setView('browse')}
              onEdit={() => { setEditRecipe(activeRecipe); setView('form'); }}
              onDelete={handleDelete}
            />
          )}

          {view === 'form' && (
            <RecipeForm
              initial={editRecipe}
              t={t}
              onSave={handleSave}
              onCancel={() => setView(editRecipe ? 'detail' : 'browse')}
            />
          )}
        </div>
      </div>

      {/* Print overlay */}
      {showPrint && (
        <PrintPreview recipes={recipes} t={t} onClose={() => setShowPrint(false)} />
      )}

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label="Visual Theme" />
        <TweakRadio label="Theme" value={tweaks.theme}
          options={['lavender', 'midnight', 'spice']}
          onChange={v => setTweak('theme', v)} />
      </TweaksPanel>

    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
